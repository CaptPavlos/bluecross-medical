version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    target-branch: "development"
    groups:
      npm-all:
        patterns:
          - "*"
    labels:
      - "dependabot"
    commit-message:
      prefix: "deps"

